<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snap Landing Page</title>
    <link rel="stylesheet" href="nav.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="nav-left">
        <h1 class="logo">snap</h1>
        <nav>
          <ul class="nav-links">
            <li class="nav-item">
              <div class="nav-trigger">
                <span>Features</span>
                <div class="arrow-box">
                  <img src="images/icon-arrow-down.svg" class="arrow-down" />
                  <img src="images/icon-arrow-up.svg" class="arrow-up" />
                </div>
              </div>
              <ul class="sub-menu features-dropdown">
                <li><img src="images/icon-todo.svg" alt="" /> Todo List</li>
                <li><img src="images/icon-calendar.svg" alt="" /> Calendar</li>
                <li>
                  <img src="images/icon-reminders.svg" alt="" /> Reminders
                </li>
                <li><img src="images/icon-planning.svg" alt="" /> Planning</li>
              </ul>
            </li>

            <li class="nav-item">
              <div class="nav-trigger">
                <span>Company</span>
                <div class="arrow-box">
                  <img src="images/icon-arrow-down.svg" class="arrow-down" />
                  <img src="images/icon-arrow-up.svg" class="arrow-up" />
                </div>
              </div>
              <ul class="sub-menu company-dropdown">
                <li>History</li>
                <li>Our Team</li>
                <li>Blog</li>
              </ul>
            </li>

            <li>Careers</li>
            <li>About</li>
          </ul>
        </nav>
      </div>

      <div class="nav-right">
        <button class="btn-login">Login</button>
        <button class="btn-register">Register</button>
      </div>
    </header>

    <main class="hero">
      <div class="hero-text">
        <h1 class="hero-title">Make<br />remote work</h1>
        <p class="hero-description">
          Get your team in sync, no matter your location. Streamline processes,
          create team rituals, and watch productivity soar.
        </p>
        <button class="btn-main">Learn more</button>

        <div class="clients">
          <img src="images/client-databiz.svg" alt="databiz" />
          <img src="images/client-audiophile.svg" alt="audiophile" />
          <img src="images/client-meet.svg" alt="meet" />
          <img src="images/client-maker.svg" alt="maker" />
        </div>
      </div>

      <div class="hero-image">
        <img src="images/image-hero-desktop.png" alt="hero image" />
      </div>
    </main>

    <script src="nav.js"></script>
  </body>
</html>
